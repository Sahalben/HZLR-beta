services:
  - type: web
    name: hzlr-production-api
    env: node
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate && npx tsc
    startCommand: node dist/index.js
    envVars:
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        value: "hzlr_production_secret_access_12345"
      - key: JWT_REFRESH_SECRET
        value: "hzlr_production_secret_refresh_12345"
